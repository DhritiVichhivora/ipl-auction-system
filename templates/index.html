<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPL Auction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <h1>IPL Auction</h1>
        <form class="search-bar" method="get" action="{{ url_for('index') }}">
            <input type="text" name="search" placeholder="Search Player" value="{{ search }}">
            <button type="submit">Search</button>
        </form>
    </div>

    <table>
        <tr>
            <th>Player</th>
            <th>Team</th>
            <th>Base Price</th>
            <th>Current Bid</th>
            <th>Update Bid</th>
        </tr>
        {% for player in players %}
        <tr>
            <td>{{ player.name }}</td>
            <td>{{ player.team }}</td>
            <td>{{ player.base_price }}</td>
            <td>{{ player.bid or player.base_price }}</td>
            <td>
                <form method="POST" action="{{ url_for('update_bid', player_id=player.id) }}">
                    <input type="number" name="bid" placeholder="Enter bid" required>
                    <button type="submit">Update</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
