<!DOCTYPE html>
<html>

<head>
    <title>IPL Auction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>🏏 IPL Auction Dashboard</h1>

<!-- Search bar -->
<input type="text" id="searchInput" placeholder="Search player name..." onkeyup="searchPlayer()">

<table id="playersTable">

    <tr>
        <th>Player Name</th>
        <th>Team</th>
        <th>Role</th>
        <th>Country</th>
        <th>Base Price</th>
        <th>Current Bid</th>
        <th>New Bid</th>
        <th>Action</th>
    </tr>

    {% for player in players %}

    <tr>
        <td>{{ player.player_name }}</td>
        <td>{{ player.team }}</td>
        <td>{{ player.role }}</td>
        <td>{{ player.country }}</td>
        <td>{{ player.base_price }}</td>
        <td>{{ player.current_bid }}</td>

        <td>
            <input type="number" id="bid_{{ loop.index }}" placeholder="Enter bid">
        </td>

        <td>
            <button onclick="updateBid('{{ player.player_name }}', {{ loop.index }})">
                Update Bid
            </button>
        </td>
    </tr>

    {% endfor %}

</table>


<script>

function searchPlayer() {

    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();
    let table = document.getElementById("playersTable");
    let tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {

        let td = tr[i].getElementsByTagName("td")[0];

        if (td) {

            let txtValue = td.textContent || td.innerText;

            if (txtValue.toLowerCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }

        }
    }
}


function updateBid(player, index) {

    let bidValue = document.getElementById("bid_" + index).value;

    fetch("/update_bid", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            player_name: player,
            new_bid: bidValue
        })

    })

    .then(response => response.json())
    .then(data => {

        alert(data.message);
        location.reload();

    });

}

</script>

</body>
</html>
