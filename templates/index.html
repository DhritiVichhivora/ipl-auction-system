<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPL Auction Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🏏 IPL Auction Dashboard</h1>

<!-- Search bar -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search player..." onkeyup="searchPlayer()">
</div>

<table id="playersTable">
    <tr>
        <th>Name</th>
        <th>Team</th>
        <th>Role</th>
        <th>Country</th>
        <th>Base Price</th>
        <th>Current Bid</th>
        <th>New Bid</th>
        <th>Action</th>
    </tr>

    {% for player in players %}
    <tr>
        <td>{{ player.name }}</td>
        <td>{{ player.team }}</td>
        <td>{{ player.role }}</td>
        <td>{{ player.country }}</td>
        <td>{{ player.base_price }}</td>
        <td id="current_{{ player.id }}">{{ player.current_price }}</td>
        <td><input type="number" id="bid_{{ player.id }}" placeholder="Enter bid"></td>
        <td><button onclick="updateBid({{ player.id }})">Update Bid</button></td>
    </tr>
    {% endfor %}
</table>

<script>
function searchPlayer() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const table = document.getElementById("playersTable");
    const trs = table.getElementsByTagName("tr");

    for (let i = 1; i < trs.length; i++) {
        const td = trs[i].getElementsByTagName("td")[0];
        trs[i].style.display = td && td.innerText.toLowerCase().includes(input) ? "" : "none";
    }
}

function updateBid(playerId) {
    const bidValue = document.getElementById(`bid_${playerId}`).value;

    fetch("/bid", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `player_id=${playerId}&price=${bidValue}`
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
        if (data.success) {
            document.getElementById(`current_${playerId}`).innerText = bidValue;
        }
    });
}
</script>

</body>
</html>
