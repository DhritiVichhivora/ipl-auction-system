<!DOCTYPE html>
<html>

<head>
    <title>IPL Auction System</title>

    <style>

        body{
            font-family: Arial;
            background-color:#f4f6f9;
            padding:40px;
        }

        h1{
            text-align:center;
        }

        .search-box{
            text-align:center;
            margin-bottom:20px;
        }

        input[type=text]{
            padding:10px;
            width:250px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#222;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .bid-box{
            width:90px;
            padding:5px;
        }

        button{
            padding:6px 10px;
            background:#28a745;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

    </style>

</head>


<body>

<h1>🏏 IPL Auction Dashboard</h1>

<div class="search-box">

<form method="GET" action="/">

<input type="text" name="search" placeholder="Search Player">

<button type="submit">Search</button>

</form>

</div>


<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Team</th>
<th>Role</th>
<th>Country</th>
<th>Base Price</th>
<th>Current Price</th>
<th>Place Bid</th>
</tr>


{% for player in players %}

<tr>

<td>{{player.id}}</td>
<td>{{player.name}}</td>
<td>{{player.team}}</td>
<td>{{player.role}}</td>
<td>{{player.country}}</td>
<td>{{player.base_price}}</td>
<td>{{player.current_price}}</td>

<td>

<form method="POST" action="/bid">

<input type="hidden" name="player_id" value="{{player.id}}">

<input class="bid-box" type="number" name="price" required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>


</body>
</html>
