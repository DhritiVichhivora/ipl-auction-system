<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>IPL Auction System</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Team</th>
                <th>Role</th>
                <th>Country</th>
                <th>Current Price</th>
                <th>Bid</th>
            </tr>
        </thead>
        <tbody>
            {% for player in players %}
            <tr>
                <td>{{ player.name }}</td>
                <td>{{ player.team }}</td>
                <td>{{ player.role }}</td>
                <td>{{ player.country }}</td>
                <td id="price-{{ player.id }}">{{ player.current_price }}</td>
                <td>
                    <input type="number" id="bid-{{ player.id }}" placeholder="Enter bid">
                    <button onclick="updateBid({{ player.id }})">Update Bid</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        function updateBid(playerId) {
            const price = $('#bid-' + playerId).val();
            $.post("/bid", { player_id: playerId, price: price }, function(data) {
                alert(data.message);
                if(data.status === "success") {
                    $('#price-' + playerId).text(data.new_price);
                }
            });
        }
    </script>
</body>
</html>
